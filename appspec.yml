# appspec.yml
version: 0.0
os: linux

files:
  - source: /          # copies all your code
    destination: /var/www/myapp   # where on EC2 to put it

hooks:
  BeforeInstall:
    - location: scripts/stop_server.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/install_dependencies.sh
      timeout: 120
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: root